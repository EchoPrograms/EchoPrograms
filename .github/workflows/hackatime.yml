name: Update Hackatime Stats

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Hackatime stats
        env:
          API_KEY: ${{ secrets.HACKATIME_API_KEY }}
          USERNAME: EchoPrograms
        run: |
          curl -s \
            -H "accept: application/json" \
            "https://hackatime.hackclub.com/api/v1/users/$USERNAME/stats" \
            -o stats.json

      - name: Generate README
        run: python3 .github/workflows/generate.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md

          git diff --cached --quiet && exit 0

          git commit -m "chore: update hackatime stats"
          git push
